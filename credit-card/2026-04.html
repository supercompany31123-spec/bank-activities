    .badge-free { background: #e8f5e9; color: #2e7d32; }

    .badge-exclusive { background: #fce4ec; color: #c2185b; }
    .discount-info { background: #f8f9fa; padding: 12px 16px; border-radius: 8px; margin-top: 10px; }
    .discount-info strong { color: #d32f2f; }
    .mutual-note { color: #e65100; font-size: 0.85rem; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    .footer { text-align: center; padding: 30px; color: #888; font-size: 0.85rem; }
    .no-data { text-align: center; padding: 40px; color: #888; }
    @media (max-width: 600px) {
      .controls { flex-direction: column; }
      .platform-section { margin-left: 0; }

  <script>
    const currentData = JSON.parse(document.getElementById('current-data').textContent);
    const historyData = JSON.parse(document.getElementById('history-data').textContent);

    const monthSelector = document.getElementById('monthSelector');
    const bankSelector = document.getElementById('bankSelector');
    const activitiesDiv = document.getElementById('activities');

    const platformIcons = {
      '蝦皮購物': '🦐',
      'momo購物網': '🛒',
      '酷澎': '🚀'
    };

    const badgeLabels = {
      'free': '免登錄',
      'reg': '需登錄',
      'exclusive': '專屬活動'
    };

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }

    function renderActivities(data) {
      const selectedBank = bankSelector.value;

      // Filter by bank
      let filtered = selectedBank === 'all' ? data : data.filter(a => a.bank === selectedBank);

      if (filtered.length === 0) {
        activitiesDiv.innerHTML = '<div class="no-data">目前沒有符合條件的活動</div>';
        return;
      }

      // Group by bank then by platform
      const grouped = {};
      filtered.forEach(a => {
        if (!grouped[a.bank]) grouped[a.bank] = {};
        if (!grouped[a.bank][a.platform]) grouped[a.bank][a.platform] = [];
        grouped[a.bank][a.platform].push(a);
      });

      let html = '';

      // 國泰世華
      if (grouped['國泰世華']) {
        html += '<div class="bank-section"><div class="bank-header cathay"><span class="bank-icon">🏦</span><span class="bank-name">國泰世華</span></div>';
        html += '<div class="platform-section">';

        ['蝦皮購物', 'momo購物網'].forEach(platform => {
          if (grouped['國泰世華'][platform]) {
            html += `<div class="platform-header">${platformIcons[platform] || '📦'} ${platform}</div>`;
            grouped['國泰世華'][platform].forEach(activity => {
              const mutualNote = activity.registration.includes('限擇優') ?
                '<div class="mutual-note">⚠️ 與同月活動限擇優回饋乙次</div>' : '';
              html += `
              <div class="activity-card">
                <div class="activity-title">${activity.campaign_name}</div>
                <div class="activity-meta">
                  <span>📅 ${formatDate(activity.start_date)} ~ ${formatDate(activity.end_date)}</span>
                  <span class="badge badge-${activity.badge}">${badgeLabels[activity.badge]}</span>
                </div>
                <div class="discount-info">${activity.discount_details}</div>
                ${activity.registration ? `<div style="margin-top:8px;font-size:0.9rem;color:#666;">📝 ${activity.registration}</div>` : ''}
                ${mutualNote}
              </div>`;
            });
          }
        });

        html += '</div></div>';
      }

      // 玉山銀行
      if (grouped['玉山']) {
        html += '<div class="bank-section"><div class="bank-header esun"><span class="bank-icon">🏦</span><span class="bank-name">玉山銀行</span></div>';
        html += '<div class="platform-section">';

        ['蝦皮購物', 'momo購物網', '酷澎'].forEach(platform => {
          if (grouped['玉山'][platform]) {
            html += `<div class="platform-header">${platformIcons[platform] || '📦'} ${platform}</div>`;
            grouped['玉山'][platform].forEach(activity => {
              const mutualNote = activity.registration.includes('無法疊加') || activity.registration.includes('恕無法') ?
                '<div class="mutual-note">⚠️ 與其他活動恕無法疊加</div>' : '';
              html += `
              <div class="activity-card">
                <div class="activity-title">${activity.campaign_name}</div>
                <div class="activity-meta">
                  <span>📅 ${formatDate(activity.start_date)} ~ ${formatDate(activity.end_date)}</span>
                  <span class="badge badge-${activity.badge}">${badgeLabels[activity.badge]}</span>
                </div>
                <div class="discount-info">${activity.discount_details}</div>
                ${activity.registration ? `<div style="margin-top:8px;font-size:0.9rem;color:#666;">📝 ${activity.registration}</div>` : ''}
                ${mutualNote}
              </div>`;
            });
          }
        });

        html += '</div></div>';
      }

      activitiesDiv.innerHTML = html;
    }

    // Event listeners
    bankSelector.addEventListener('change', () => renderActivities(currentData));

    // Initial render
    renderActivities(currentData);
  </script>
